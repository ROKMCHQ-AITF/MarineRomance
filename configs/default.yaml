exp_name: default
seed: 42
debug: false

data:
  train_csv: input/train.csv
  audio_dir: input/audio
  folds_csv: /home/elicer/MarineRomance/input/fold.csv
  label_col: primary_label
  id_col: filename
  group_col: ship_id
  multilabel: false
  sample_rate: 32000
  duration: 5.0
  crop: random

feature:
  type: melspec          # melspec | log_mel | mfcc | cqt | lofar | demon | raw
  compute_on: gpu        # gpu | cpu
  n_fft: 1024
  hop_length: 320
  win_length: 1024
  n_mels: 128
  fmin: 50
  fmax: 16000
  power: 2.0
  to_db: true
  normalize: true
  log_eps: 1.0e-6        # floor for log_mel: log(mel.clamp(min=log_eps))
  image_size: [256, 256]
  n_channels: 3
  channel_mode: repeat   # repeat | delta | log_linear | harmonic_percussive | multi_res | multi_feat
  n_mfcc: 40             # (mfcc) number of MFCC coefficients
  n_bins: 84             # (cqt) number of CQT frequency bins
  bins_per_octave: 12    # (cqt) bins per octave
  lofar_n_fft: 4096      # (lofar) large FFT for fine freq resolution
  lofar_n_bins: 256      # (lofar) low-freq bins to keep (0 ~ lofar_n_bins * sr/lofar_n_fft Hz)
  demon_fmin: 1000.0     # (demon) bandpass low cutoff Hz
  demon_fmax: 10000.0    # (demon) bandpass high cutoff Hz
  demon_env_cutoff: 50.0 # (demon) envelope lowpass cutoff Hz
  demon_env_sr: 400      # (demon) envelope sample rate after decimation
  demon_n_fft: 256       # (demon) FFT size for envelope spectrogram
  demon_hop_length: 8    # (demon) hop length for envelope spectrogram
  hpss_kernel_harm: 31   # (harmonic_percussive) median filter kernel along time axis
  hpss_kernel_perc: 31   # (harmonic_percussive) median filter kernel along freq axis
  channel_features:      # (multi_feat) feature type per channel; melspec | log_mel | lofar | demon
    - melspec
    - lofar
    - demon

model:
  type: timm             # timm | ast | beats
  backbone: tf_efficientnet_b0_ns
  pretrained: true
  hf_model: null                # HuggingFace model ID (ast: MIT/ast-finetuned-audioset-10-10-0.4593)
  pretrained_path: input/pretrained/BEATs_iter3_plus_AS2M.pt  # beats checkpoint
  in_chans: 3
  num_classes: 182       # update after running prepare_folds.py
  head: linear           # linear | sed
  drop_rate: 0.2
  drop_path_rate: 0.2

train:
  folds: [0]
  n_folds: 5
  epochs: 10
  batch_size: 32
  num_workers: 4
  amp: true
  grad_accum: 1
  clip_grad: null

augment:
  mixup: 0.0
  mixup_mode: max
  spec_augment: false
  freq_mask: 24
  time_mask: 40
  gain: false
  gain_range: [0.6, 1.4]
  noise: false
  noise_amp: 0.005
  pitch_shift: false
  pitch_shift_range: [-2.0, 2.0]  # semitones
  time_shift: false
  time_shift_range: 0.1            # fraction of clip length

loss:
  type: bce              # bce | focal | ce | lsep | combo
  focal_gamma: 2.0       # (focal) focusing parameter γ — 높을수록 어려운 샘플에 집중
  label_smoothing: 0.0   # 0.0=hard label; >0이면 bce·focal·ce·combo 모두 적용 (예: 0.1)
  # type=combo 일 때 아래 components 리스트를 사용한다. weight 합은 자동 정규화.
  # components:
  #   - {type: focal, weight: 0.7, focal_gamma: 2.0}
  #   - {type: bce,   weight: 0.3}
  # components 안에서 label_smoothing을 개별 지정하면 위 global 값보다 우선한다.
  # 예: - {type: focal, weight: 0.7, focal_gamma: 2.0, label_smoothing: 0.05}

optimizer:
  type: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine      # cosine | onecycle | plateau | none
  warmup_ratio: 0.1
  min_lr: 1.0e-6

metric:
  name: f1              # f1 | macro_f1 | auc | cmap
  monitor: val_f1
  mode: max

wandb:
  project: kaggle-audio-clf
  entity: null
  mode: online           # online | offline | disabled
  tags: []
