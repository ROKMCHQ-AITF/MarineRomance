exp_name: exp001_baseline
seed: 42
debug: true
data:
  train_csv: input/train_metadata.csv
  audio_dir: input/train_audio
  folds_csv: input/folds.csv
  label_col: primary_label
  id_col: filename
  group_col: null
  multilabel: true
  sample_rate: 32000
  duration: 5.0
  crop: random
feature:
  type: melspec
  compute_on: gpu
  n_fft: 1024
  hop_length: 320
  win_length: 1024
  n_mels: 128
  fmin: 50
  fmax: 16000
  power: 2.0
  to_db: true
  normalize: true
  image_size:
  - 128
  - 128
  n_channels: 3
  channel_mode: repeat
model:
  backbone: tf_efficientnet_b0_ns
  pretrained: true
  in_chans: 3
  num_classes: 50
  head: linear
  drop_rate: 0.2
  drop_path_rate: 0.2
train:
  folds:
  - 0
  n_folds: 5
  epochs: 1
  batch_size: 4
  num_workers: 0
  amp: true
  grad_accum: 1
  clip_grad: null
augment:
  mixup: 0.0
  mixup_mode: max
  spec_augment: false
  freq_mask: 24
  time_mask: 40
  gain: false
  gain_range:
  - 0.6
  - 1.4
  noise: false
  noise_amp: 0.005
loss:
  type: bce
  focal_gamma: 2.0
  label_smoothing: 0.0
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_ratio: 0.1
  min_lr: 1.0e-06
metric:
  name: f1
  monitor: val_f1
  mode: max
wandb:
  project: Navy-Marine-ai-contest
  entity: null
  mode: disabled
  tags:
  - baseline
  - 1fold
